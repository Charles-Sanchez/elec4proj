name: Verify and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci
        
      # List files to debug "file not found" errors
      - name: Diagnostic - List Files
        run: ls -R
        
      - name: Check for Syntax Errors (Lint)
        run: npm run lint
        
      - name: Verify TypeScript & Vite Build
        run: npm run build
        
      - name: Test Docker Container Build
        run: docker build -t elec4-app .