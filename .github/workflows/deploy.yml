name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-id: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/charles-website
            git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Charles-Sanchez/elec4proj.git
            git pull origin main
            sudo docker build --no-cache -t elec4proj:latest .
            sudo docker stop elec4proj || true
            sudo docker rm -f elec4proj || true
            sudo docker run -d --restart always --name elec4proj -p 3000:3000 elec4proj:latest
