name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-id: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: |
          npx eslint . --format compact > lint-report.txt || true
          cat lint-report.txt

      - name: Log Lint Warnings to bughist.md
        run: |
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          USER="${{ github.actor }}"
          WARNING_COUNT=$(grep -c "warning" lint-report.txt || echo "0")
          ERROR_COUNT=$(grep -c "error" lint-report.txt || echo "0")
          
          if [ ! -f bughist.md ]; then
            echo "# Bug History Log" > bughist.md
            echo "| Timestamp | User | Status | Issues |" >> bughist.md
            echo "| :--- | :--- | :--- | :--- |" >> bughist.md
          fi
          
          if [ "$ERROR_COUNT" -gt "0" ] || [ "$WARNING_COUNT" -gt "0" ]; then
             echo "| $TIMESTAMP | $USER | LINT ISSUES | $ERROR_COUNT errors, $WARNING_COUNT warnings |" >> bughist.md
             
             git config --global user.name "github-actions[bot]"
             git config --global user.email "github-actions[bot]@users.noreply.github.com"
             git add bughist.md
             git commit -m "chore: log lint results for $USER at $TIMESTAMP [skip ci]" || true
             git push || true
          fi

      - name: Build project (Type Check + Build)
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/charles-website
            git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Charles-Sanchez/elec4proj.git
            git pull origin main
            sudo docker build -t elec4proj:latest .
            sudo docker stop elec4proj || true
            sudo docker rm -f elec4proj || true
            sudo docker run -d --restart always --name elec4proj -p 3000:3000 elec4proj:latest
