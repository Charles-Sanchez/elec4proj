name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/charles-website
            git remote set-url origin git@github.com:Charles-Sanchez/elec4proj.git || true
            git pull origin main
            sudo docker build -t elec4proj:latest .
            sudo docker stop elec4proj || true
            sudo docker rm elec4proj || true
            sudo docker run -d --restart always --name elec4proj -p 3000:3000 elec4proj:latest

  log-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log Error to bughist.md
        run: |
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          USER="${{ github.actor }}"
          if [ ! -f bughist.md ]; then
            echo "# Bug History Log" > bughist.md
            echo "| Timestamp | User | Status |" >> bughist.md
            echo "| :--- | :--- | :--- |" >> bughist.md
          fi
          echo "| $TIMESTAMP | $USER | FAILED PUSH/DEPLOY |" >> bughist.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bughist.md
          git commit -m "chore: log failure for $USER at $TIMESTAMP [skip ci]"
          git push
